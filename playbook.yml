---
- name: Install Apache and deploy MediTrack website
  hosts: webservers
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Ensure Apache is started and enabled
      service:
        name: apache2
        state: started
        enabled: true

    - name: Copy index.html
      copy:
        src: index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Copy style.css
      copy:
        src: style.css
        dest: /var/www/html/style.css
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Ensure web root permissions
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"